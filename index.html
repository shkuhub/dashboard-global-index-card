<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Global Market Signal Widget</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet" />
  <style>
    /* Reset & Base */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #F2F4F6;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      font-family: 'Pretendard', sans-serif;
    }

    /* Block: Analysis Card */
    .analysis-card {
      background: #FFFFFF;
      border-radius: 24px;
      width: 385px;
      padding: 24px 20px 20px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.04), 0 4px 16px rgba(0,0,0,0.08), 0 12px 40px rgba(0,0,0,0.06);
      position: relative;
      overflow: hidden;
    }

    .analysis-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, #0064FF 0%, #4D9DFF 100%);
    }

    /* Elements */
    .analysis-card__header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .analysis-card__header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .analysis-card__icon-wrapper {
      width: 36px;
      height: 36px;
      background: #EEF4FF;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .analysis-card__title-group {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .analysis-card__title {
      font-size: 15px;
      font-weight: 700;
      color: #191F28;
      letter-spacing: -0.3px;
    }

    .analysis-card__subtitle {
      font-size: 11px;
      font-weight: 500;
      color: #8B95A1;
    }

    .analysis-card__badge {
      background: #EEF4FF;
      color: #0064FF;
      font-size: 11px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 20px;
    }

    .analysis-card__divider {
      height: 1px;
      background: #F2F4F6;
      margin: 0 -20px 16px;
    }

    .analysis-card__chart-container {
      border-radius: 14px;
      overflow: hidden;
      background: #FAFAFA;
      border: 1px solid #F2F4F6;
    }

    .analysis-card__iframe {
      display: block;
    }

    .analysis-card__footer {
      margin-top: 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .analysis-card__source-text {
      font-size: 11px;
      color: #B0B8C1;
    }

    .analysis-card__link {
      font-size: 11px;
      font-weight: 600;
      color: #0064FF;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 3px;
    }

    .analysis-card__link:hover { opacity: 0.7; }
    .analysis-card__link::after { content: '→'; font-size: 10px; }
  </style>
</head>
<body>
  <article class="analysis-card">
    <header class="analysis-card__header">
      <div class="analysis-card__header-left">
        <div class="analysis-card__icon-wrapper">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" width="18" height="18">
            <path d="M4 20L8.5 13L12.5 16L17 9L20 12" stroke="#0064FF" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="20" cy="12" r="1.5" fill="#0064FF"/>
          </svg>
        </div>
        <div class="analysis-card__title-group">
          <h1 class="analysis-card__title">기술적 분석</h1>
          <p class="analysis-card__subtitle">실시간 시그널 요약</p>
        </div>
      </div>
      <span class="analysis-card__badge">LIVE</span>
    </header>

    <div class="analysis-card__divider"></div>

    <div class="analysis-card__chart-container">
      <iframe
        class="analysis-card__iframe"
        frameborder="0"
        scrolling="no"
        height="274"
        width="345"
        src="https://ssltools.investing.com/technical_summary.php?pairs=166,170,172,175,178,179&curr-name-color=%230059B0&fields=1h,1d&force_lang=18"
      ></iframe>
    </div>

    <footer class="analysis-card__footer">
      <span class="analysis-card__source-text">Investing.com 제공</span>
      <a href="https://kr.investing.com/" target="_blank" rel="nofollow" class="analysis-card__link">자세히 보기</a>
    </footer>
  </article>
</body>
</html>
